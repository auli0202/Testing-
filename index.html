    :root {
      --bg-main: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-sub: #475569;
      --accent: #2563eb;
      --border: #e2e8f0;
      --nav-bg: rgba(255, 255, 255, 0.96);
      --correct: #10b981;
      --wrong: #ef4444;
      --review: #f59e0b;
      --ex-bg: #f1f5f9;
      --family-w: #000;
      --header:#000;
    }

    html.dark {
  --bg-main: #0f172a;       /* Deep Navy */
  --card-bg: #1e293b;       /* Slate Blue */
  --text-main: #f1f5f9;     /* Soft White */
  --text-sub: #94a3b8;      /* Muted Slate */
  --accent: #38bdf8;        /* Vivid Sky Blue */
  --border: #334155;        /* Subtle Border */
  --nav-bg: rgba(15, 23, 42, 0.9);
  --correct: #22c55e;
  --wrong: #f43f5e;
  --review: #eab308;
  --ex-bg: #111827;         /* Contrast background for examples */
  --family-w:#dadee3;
  --header:#ffffff;
}

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      padding-bottom: 110px;
      transition: background 0.3s;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* --- Smart Header --- */
    .header {
      background: var(--nav-bg); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 1000; padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      transition: transform 0.4s ease;
    }
    .header.header-hidden { transform: translateY(-100%); pointer-events: none; }

    #header-show-tab {
        position: fixed; top: 0; left: 50%; transform: translateX(-50%);
        background: var(--accent); color: white; padding: 5px 20px;
        border-radius: 0 0 15px 15px; font-size: 0.75rem; font-weight: 800;
        z-index: 1001; cursor: pointer; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.8rem; }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: 800; font-size: 2rem; color: var(--accent); cursor: pointer; }

    .header-actions { display: flex; align-items: center; gap: 0.4rem; }
    .action-btn-circle {
        width: 2.2rem; height: 2.2rem; border-radius: 50%; border: 1.5px solid var(--border);
        background: var(--card-bg); color: var(--text-main); display: flex;
        align-items: center; justify-content: center; cursor: pointer; font-size: 1rem;
    }
    .action-btn-circle.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* BIG STATS BUTTONS */
    .stats-row { display: flex; gap: 0.5rem; justify-content: space-between; align-items: center; }
    .stat-chip { 
      flex: 1; height: 3.5rem; border-radius: 0.8rem; border: 1.5px solid var(--border);
      background: var(--card-bg); display: flex; flex-direction: column; 
      align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
      min-width: 0; /* Ensures shrinking on small mobile */
    }
    .stat-chip span:first-child { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; opacity: 0.7; }
    .stat-chip span:last-child { font-size: 1rem; font-weight: 800; }

    .stat-chip.total { border-color: var(--accent); color: var(--accent); }
    .stat-chip.m { border-color: var(--correct); color: var(--correct); }
    .stat-chip.r { border-color: var(--review); color: var(--review); }

    .overall-progress-wrap { width: 100%; height: 4px; background: var(--border); border-radius: 10px; overflow: hidden; }
    #overall-progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.5s ease; }

    /* --- Blind Mode --- */
    .blind-mode .c-tag, .blind-mode .c-bn, .blind-mode .c-ex-en, 
    .blind-mode .c-pron, .blind-mode .c-ex-bn, .blind-mode .c-family-wrap,
    .blind-mode .c-actions { display: none !important; }
    .blind-mode .wcard { min-height: 5rem; justify-content: center; border-left-width: 4px; }

    .main-container { max-width: 1200px; margin: 0 auto; padding: 0.8rem; }
    .controls { 
      background: var(--card-bg); padding: 0.8rem; border-radius: 1rem; border: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.2rem;
    }
    input, select, .btn {
      padding: 0.6rem; border-radius: 0.6rem; border: 1.5px solid var(--border);
      background: var(--card-bg); color: var(--text-main); font-size: 0.85rem; outline: none;
    }
    .btn { font-weight: 700; cursor: pointer; }
    .btn-outline { border: 2px solid var(--accent); color: var(--accent); min-width: 2.8rem; }
    .btn-primary { background: var(--accent); color: white; border: none; }

    /* --- Word Cards --- */
    .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .wcard {
      background: var(--card-bg); border-radius: 1.5rem; padding: 1.2rem;
      border: 1.5px solid var(--border); display: flex; flex-direction: column; 
    }
    .wcard.mastered { border-left: 0.5rem solid var(--correct); }
    .wcard.reviewing { border-left: 0.5rem solid var(--review); }

    .c-tag { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; background: var(--accent); color: white; padding: 3px 8px; border-radius: 5px; display: inline-block; margin-bottom: 0.8rem; align-self: flex-start; }
    .c-en { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .c-bn { font-family: 'Noto Serif Bengali', serif; font-size: 1.3rem; color: var(--text-main); font-weight: 600; margin-bottom: 0.8rem; }
    .c-ex-en { font-size: 0.9rem; font-style: italic; color: var(--text-sub); margin-bottom: 0.6rem; line-height: 1.4; padding-left: 0.6rem; border-left: 3px solid var(--accent); }
    .c-pron { font-size: 0.95rem; color: var(--family-w); font-family: monospace; margin-bottom: 0.8rem; font-weight: bolder; }
    .c-ex-bn { font-family: 'Noto Serif Bengali', serif; font-size: 1.2rem; color: rgba(0, 0, 0, .85); font-weight: 600; line-height: 1.4; }
    .c-family-wrap { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.2rem; }
    .c-family { font-size: 1rem; color: var(--text-sub); font-weight: 500; }

    .c-actions { display: flex; gap: 0.5rem; margin-top: auto; border-top: 1.5px solid var(--border); padding-top: 1rem; }
    .s-btn { flex: 1; padding: 0.6rem; border-radius: 0.7rem; border: 2px solid var(--border); font-size: 0.8rem; font-weight: 700; cursor: pointer; background: transparent; color: var(--text-main); }
    .s-btn.m.active { background: var(--correct); color: white; border-color: var(--correct); }
    .s-btn.r.active { background: var(--review); color: white; border-color: var(--review); }

    /* --- Adaptive Flashcards (Fixed Size, Scaling Text) --- */
    .fc-wrap { width: 100%; max-width: 400px; margin: 0 auto; }
    .flip-card {
      background: var(--card-bg); 
      height: 60vh; /* Relative to screen height */
      max-height: 480px; 
      min-height: 380px;
      border-radius: 2rem; border: 2.5px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 1.5rem; cursor: pointer; position: relative;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
      overflow: hidden; /* Important: prevents card growing */
    }

    /* Text scaling logic */
    .fc-en-text { 
        font-size: clamp(1.8rem, 10vw, 3.2rem); 
        font-weight: 800; 
        width: 100%; 
        word-wrap: break-word; 
        line-height: 1.1;
    }
    .fc-bn-text { 
        font-family: 'Noto Serif Bengali', serif; 
        font-size: clamp(1.4rem, 8vw, 2.5rem); 
        line-height: 1.3;
        width: 100%;
    }
    .fc-detail-box {
        margin-top: 1rem; padding: 1rem; background: var(--ex-bg); 
        border-radius: 1.2rem; width: 100%; max-height: 50%; overflow-y: auto;
    }
    .fc-ex-en-small { font-size: clamp(0.8rem, 3.5vw, 1rem); font-style: italic; color: var(--text-sub); }
    .fc-ex-bn-small { font-family: 'Noto Serif Bengali', serif; font-size: clamp(0.9rem, 4vw, 1.2rem); color: var(--accent); font-weight: 700; display: block; margin-top: 5px; }

    .fc-speak-btn { position: absolute; top: 1.2rem; right: 1.2rem; font-size: 1.8rem; background: none; border: none; cursor: pointer; z-index: 10; }
    .fc-nav { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
    .fc-nav-btn { flex: 1; max-width: 120px; height: 3.2rem; }

    /* --- Quiz --- */
    .quiz-card { background: var(--card-bg); padding: 1.5rem; border-radius: 1.5rem; border: 2.5px solid var(--border); max-width: 600px; margin: 0 auto; }
    .q-opt {
      width: 100%; padding: 1rem; margin-top: 0.8rem; border-radius: 1rem;
      border: 2px solid var(--border); background: var(--card-bg);
      font-family: 'Noto Serif Bengali', serif; font-size: 1.1rem; text-align: left; cursor: pointer;
    }

    /* --- Pagination --- */
    .pagination { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 0.4rem; margin: 1.5rem 0; }

    /* --- Bottom Nav --- */
    .bottom-nav {
  position: fixed; 
  bottom: 0; 
  left: 0; 
  right: 0; 
  height: 4.8rem;
  background: var(--nav-bg); 
  backdrop-filter: blur(15px); 
  border-top: 1px solid var(--border);
  display: flex; 
  justify-content: space-around; 
  align-items: center; 
  z-index: 2000; /* Increased z-index */
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Smoother transition */
}

/* This is the class that hides the nav */
.bottom-nav.nav-hidden { 
  transform: translateY(100%) !important; 
  pointer-events: none; 
}

/* Remove bottom padding from body when nav is hidden */
body.no-nav {
  padding-bottom: 20px !important;
}
    .nav-item { border: none; background: none; display: flex; flex-direction: column; align-items: center; color: var(--text-sub); flex: 1; cursor: pointer; }

/* --- Desktop Nav Styling (PC ONLY) --- */
.desktop-nav {

}

.d-nav-item.active {

}

/* --- RESPONSIVE LOGIC --- */

/* For PC (Screens larger than 768px) */
@media (min-width: 768px) {
    .desktop-nav {
        display: flex; /* Show the header links */
    }

    .bottom-nav {
        display: none !important; /* Hide the bottom bar on PC */
    }

    body {
        padding-bottom: 40px; /* Remove the huge bottom padding on PC */

    #nav-toggle {
        display: none; /* Hide the mobile menu toggle on PC */
    }
}

/* For Mobile (Screens smaller than 767px) */
@media (max-width: 767px) {
    .desktop-nav {
        display: none; /* Hide top links on Mobile */

}

        <button class="action-btn-circle" id="nav-toggle">☰</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-chip total" id="st-all"><span>Total</span><span id="c-all">0</span></div>
      <div class="stat-chip m" id="st-m"><span>Mastered</span><span id="c-m">0</span></div>
      <div class="stat-chip r" id="st-r"><span>Review</span><span id="c-r">0</span></div>
    </div>
    <div class="overall-progress-wrap"><div id="overall-progress-fill"></div></div>
  </div>
</header>

<div class="main-container">
  <!-- BROWSE -->
  <section id="v-browse">
    <div class="controls">
      <input type="text" id="search-input" placeholder="Search..." style="flex: 1; min-width: 120px;" oninput="renderBrowse()">
      <!-- Find this line in <section id="v-browse"> -->
      <select id="f-cat" onchange="renderBrowse()"><option value="">Categories</option></select>
<!-- REMOVED style="flex: 1;" -->
      <select id="f-status" onchange="renderBrowse()"><option value="">Status</option><option value="m">Mastered</option><option value="r">Review</option></select>
      <div style="display: flex; gap: 5px; width: 100%;">
          <select id="f-sort" onchange="renderBrowse()">
          <option value="oldest">Oldest First</option>
          <option value="newest">Newest First</option>
          <option value="important">Most Important</option> <!-- New Option -->
          </select>
          <button class="btn btn-outline" id="f-dec">A-</button>
          <button class="btn btn-outline" id="f-inc">A+</button>
      </div>
    </div>
    <div id="grid-browse" class="word-grid"></div>
    <div id="pag-box" class="pagination"></div>
  </section>

  <!-- FLASHCARDS -->
  <section id="v-flash" class="hidden">
    <div class="controls">
      <!-- Find this line in <section id="v-flash"> -->
    <select id="fc-cat"><option value="">All Categories</option></select>
<!-- REMOVED style="flex: 1;" -->
      <button class="btn btn-primary" onclick="initFC()">Start</button>
      <label style="display:flex; align-items:center; gap:5px; font-size:0.8rem; font-weight:700;">
        <input type="checkbox" id="fc-auto-speak"> Speak
      </label>
    </div>
    <div class="fc-wrap">
    <!-- Add this counter span -->
    <span class="fc-counter" id="fc-counter-text">0 / 0</span>

    <div class="session-progress-wrap">
        <div id="session-progress-fill"></div>
    </div>

    <div id="fc-card" class="flip-card">
        <p style="font-weight:700; opacity:0.5;">Select Category & Start</p>
    </div>

    <!-- ADD THIS SECTION BACK -->
    <div class="fc-nav">
        <button class="btn btn-outline fc-nav-btn" onclick="fcPrev()">PREV</button>
        <button class="btn btn-outline fc-nav-btn" onclick="fcNext()">NEXT</button>
    </div>
</div>
</div>
  </section>

  <!-- QUIZ -->
  <section id="v-quiz" class="hidden">
    <div class="controls">
      <!-- Find this line in <section id="v-quiz"> -->
    <select id="quiz-cat"><option value="">All Categories</option></select>
<!-- REMOVED style="flex: 1;" -->
      <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
    </div>
    <div id="quiz-area"></div>
  </section>

  <!-- SAVED -->
  <section id="v-saved" class="hidden">
    <div class="controls" style="justify-content: space-between; align-items:center;">
      <h3 style="font-weight:800;">Library</h3>
      <button class="btn" style="color:var(--wrong); border:2px solid var(--wrong); padding: 4px 10px;" onclick="clearProg()">Reset</button>
    </div>
    <div id="grid-saved" class="word-grid"></div>
  </section>
</div>

<nav class="bottom-nav" id="main-nav">
  <button class="nav-item active" onclick="showV('browse')">
    <div class="nav-icon">📚</div><div class="nav-label">Browse</div>
  </button>
  <button class="nav-item" onclick="showV('flash')">
    <div class="nav-icon">🃏</div><div class="nav-label">Flash</div>
  </button>
  <button class="nav-item" onclick="showV('quiz')">
    <div class="nav-icon">⚡</div><div class="nav-label">Quiz</div>
  </button>
  <button class="nav-item" onclick="showV('saved')">
    <div class="nav-icon">⭐</div><div class="nav-label">Saved</div>
  </button>
</nav>

<script>
  let vocab = [];
  let progress = JSON.parse(localStorage.getItem('hscEliteData') || '{}');
  let curPg = 1;
  const pgSize = 16;
  let isBlindMode = false;

  let currentFontSize = parseInt(localStorage.getItem('hscEliteFont')) || 16;
  function updateRootFontSize() {
    document.documentElement.style.fontSize = currentFontSize + 'px';
    localStorage.setItem('hscEliteFont', currentFontSize);
  }
  document.getElementById('f-inc').onclick = () => { triggerHaptic(); currentFontSize += 2; updateRootFontSize(); };
  document.getElementById('f-dec').onclick = () => { triggerHaptic(); currentFontSize = Math.max(10, currentFontSize - 2); updateRootFontSize(); };

  let fcList = [], fcIdx = 0, fcFlipped = false;
  let qList = [], qIdx = 0, qScore = 0;


  function triggerHaptic() {
    if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(15);
    }
  }


  function toggleFull() {
    triggerHaptic();
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else if (document.exitFullscreen) document.exitFullscreen();
  }
  document.getElementById('btn-full').onclick = toggleFull;


  let lastScrollY = window.scrollY;
  let headerManuallyHidden = false;
  window.addEventListener("scroll", () => {
    if (headerManuallyHidden) return;
    const header = document.getElementById("main-header");
    if (window.scrollY > lastScrollY && window.scrollY > 150) header.classList.add("header-hidden");
    else header.classList.remove("header-hidden");
    lastScrollY = window.scrollY;
  });

  function toggleHeaderManual(hide) {
    triggerHaptic();
    const header = document.getElementById("main-header");
    const tab = document.getElementById("header-show-tab");
    headerManuallyHidden = hide;
    if (hide) { header.classList.add("header-hidden"); tab.style.display = "block"; }
    else { header.classList.remove("header-hidden"); tab.style.display = "none"; }
  }
  document.getElementById('btn-header-hide').onclick = () => toggleHeaderManual(true);


  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    const data = [];
    for(let i = 1; i < lines.length; i++) {
      const row = []; let cell = '', inQ = false;
      for(let char of lines[i]) {
        if(char === '"') inQ = !inQ;
        else if(char === ',' && !inQ) { row.push(cell.trim()); cell = ''; }
        else cell += char;
      }
      row.push(cell.trim());
      if(row[0] && row[1]) {
        data.push({
          en: row[0], bn: row[1], pron: row[2] || '', 
          ex_en: row[3] || '', cat: row[4] || 'Misc',
          ex_bn: row[5] || '', family: row[6] || '',
          important: parseInt(row[7]) || 0 
        });
      }
    }
    return data;
  }

  async function loadData() {
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8DBdIY6VFMiSQvoLP_VY-6iE-zYfh_ClBckWTI00eQXNMa_JnXilcdVoE6FRaSt8TeOHh2kCE0Wp6/pub?gid=0&single=true&output=csv';
    try {
      const res = await fetch(url);
      const txt = await res.text();
      vocab = parseCSV(txt);
      initFilters();
      renderBrowse();
      updateStats();
    } catch(e) { showToast("Connection error."); }
  }

  function updateStats() {
    const mCount = Object.values(progress).filter(v => v === 'm').length;
    const rCount = Object.values(progress).filter(v => v === 'r').length;
    const total = vocab.length;
    document.getElementById('c-all').innerText = total;
    document.getElementById('c-m').innerText = mCount;
    document.getElementById('c-r').innerText = rCount;
    if (total > 0) document.getElementById('overall-progress-fill').style.width = ((mCount + rCount) / total * 100) + '%';
    localStorage.setItem('hscEliteData', JSON.stringify(progress));
  }

  function filterByStat(status) {
    triggerHaptic();
    showV('browse');
    document.getElementById('f-status').value = status;
    document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
    if (status === 'm') document.getElementById('st-m').classList.add('active');
    else if (status === 'r') document.getElementById('st-r').classList.add('active');
    else document.getElementById('st-all').classList.add('active');
    curPg = 1;
    renderBrowse();
  }

  document.getElementById('st-all').onclick = () => filterByStat('');
  document.getElementById('st-m').onclick = () => filterByStat('m');
  document.getElementById('st-r').onclick = () => filterByStat('r');

  function toggleStatus(en, status) {
    triggerHaptic();
    if(progress[en] === status) delete progress[en];
    else progress[en] = status;
    updateStats();
    renderBrowse(false);
    if(!document.getElementById('v-saved').classList.contains('hidden')) renderSaved();
  }

  function renderBrowse(scroll = true) {
    const query = document.getElementById('search-input').value.toLowerCase();
    const cat = document.getElementById('f-cat').value;
    const stat = document.getElementById('f-status').value;
    const sort = document.getElementById('f-sort').value;

    let filtered = vocab.filter(v => {
      const matchSearch = v.en.toLowerCase().includes(query) || v.bn.includes(query);
      const matchCat = !cat || v.cat === cat;
      const matchStat = !stat || progress[v.en] === stat;
      return matchSearch && matchCat && matchStat;
    });

    if (sort === 'newest') filtered = [...filtered].reverse();
    else if (sort === 'important') filtered.sort((a, b) => b.important - a.important);

    const total = Math.ceil(filtered.length / pgSize);
    curPg = Math.min(curPg, total || 1);
    const grid = document.getElementById('grid-browse');
    grid.innerHTML = filtered.slice((curPg - 1) * pgSize, curPg * pgSize).map(v => createCard(v)).join('');
    renderPag(total);
    if(scroll) window.scrollTo(0,0);
  }

  function createCard(v) {
    const s = progress[v.en];
    const fam = v.family ? v.family.split(',').map(f => `<span class="c-family">${f.trim()}</span>`).join('') : '';
    const isHighImportance = v.important >= 4;
    const impBadge = isHighHighImportance = v.important >= 4 ? `<span class="star-badge">★</span>` : '';
    
    return `
      <div class="wcard ${s === 'm' ? 'mastered' : (s === 'r' ? 'reviewing' : '')} ${isHighImportance ? 'is-important' : ''}">
        <div class="c-tag">${v.cat}</div>
        <div class="c-header" style="display:flex; justify-content:space-between; align-items:center;">
          <div class="c-en">${v.en}${impBadge}</div>
          <button style="background:none; border:none; font-size:1.5rem; cursor:pointer;" onclick="speak('${v.en.replace(/'/g,"")}')">🔊</button>
        </div>
        <div class="c-bn">${v.bn}</div>
        ${v.ex_en ? `<div class="c-ex-en">${v.ex_en}</div>` : ''}
        <div class="c-pron">${v.pron}</div>
        ${v.ex_bn ? `<div class="c-ex-bn" style="color:var(--text-main)">${v.ex_bn}</div>` : ''}
        <div class="c-family-wrap">${fam}</div>
        <div class="c-actions">
          <button class="s-btn m ${s==='m'?'active':''}" onclick="toggleStatus('${v.en.replace(/'/g,"\\'")}', 'm')">Master</button>
          <button class="s-btn r ${s==='r'?'active':''}" onclick="toggleStatus('${v.en.replace(/'/g,"\\'")}', 'r')">Review</button>
        </div>
      </div>`;
  }

  function renderPag(total) {
    const box = document.getElementById('pag-box');
    if(total <= 1) { box.innerHTML = ''; return; }
    let html = `<div class="jump-box"><input type="number" id="jump-in" style="width:35px; border:none; background:none; text-align:center; color:var(--accent); font-weight:800;" value="${curPg}"> <span style="font-size:0.8rem;">/ ${total}</span> <button class="btn btn-primary" style="padding:2px 6px; border-radius:5px; font-size:0.7rem;" onclick="doJump(${total})">Go</button></div>`;
    for(let i = 1; i <= total; i++) {
      if(i === 1 || i === total || (i >= curPg - 1 && i <= curPg + 1)) {
        html += `<button class="btn ${i === curPg ? 'btn-primary' : 'btn-outline'}" style="min-width:30px; padding:5px;" onclick="setPg(${i})">${i}</button>`;
      } else if(i === curPg - 2 || i === curPg + 2) html += `<span style="opacity:0.4">..</span>`;
    }
    box.innerHTML = html;
  }
  function setPg(p) { triggerHaptic(); curPg = p; renderBrowse(); }
  function doJump(max) { triggerHaptic(); const p = parseInt(document.getElementById('jump-in').value); if(p >= 1 && p <= max) setPg(p); }

  function showV(v) {
    triggerHaptic();
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    document.getElementById(`v-${v}`).classList.remove('hidden');
    document.querySelectorAll('.nav-item, .d-nav-item').forEach(n => n.classList.remove('active'));
    const idxMap = { 'browse': 0, 'flash': 1, 'quiz': 2, 'saved': 3 };
    if(document.querySelectorAll('.nav-item')[idxMap[v]]) document.querySelectorAll('.nav-item')[idxMap[v]].classList.add('active');

    if(document.querySelectorAll('.d-nav-item')[idxMap[v]]) document.querySelectorAll('.d-nav-item')[idxMap[v]].classList.add('active');
    if(v === 'saved') renderSaved();
    window.scrollTo(0,0);
  }









  document.getElementById('theme-toggle').onclick = function() {
    triggerHaptic();
    const isD = document.documentElement.classList.toggle('dark');
    localStorage.setItem('hscEliteDark', isD ? 'dark' : 'light');
    this.innerText = isD ? "☀️" : "🌙";
  };

  document.getElementById('nav-toggle').onclick = function() {
    triggerHaptic();
    const nav = document.getElementById('main-nav');
    nav.classList.toggle('nav-hidden');
    document.body.classList.toggle('no-nav');
  };


  document.getElementById('fc-card').onclick = function() {
    triggerHaptic();
    if(fcList.length > 0) { fcFlipped = !fcFlipped; renderFC(); }
  };

  function initFC() {
    triggerHaptic();
    const cat = document.getElementById('fc-cat').value;
    fcList = vocab.filter(v => !cat || v.cat === cat).sort(() => Math.random() - 0.5);
    if(!fcList.length) { showToast("No words found."); return; }
    fcIdx = 0; fcFlipped = false;
    renderFC();
  }

  function renderFC() {
    if (!fcList.length) return;
    const v = fcList[fcIdx];
    const card = document.getElementById('fc-card');
    document.getElementById('session-progress-fill').style.width = ((fcIdx + 1) / fcList.length * 100) + '%';
    document.getElementById('fc-counter-text').innerText = `${fcIdx + 1} / ${fcList.length}`;
    const enSizeClass = v.en.length > 12 ? 'style="font-size: 1.8rem"' : '';
    const star = v.important >= 4 ? '<span class="star-badge">★</span>' : '';

    if(!fcFlipped) {
      card.innerHTML = `
        <button class="fc-speak-btn" onclick="event.stopPropagation(); speak('${v.en.replace(/'/g,"")}')">🔊</button>
        <span class="c-tag">${v.cat}</span>
        <div class="fc-en-text" ${enSizeClass}>${v.en}${star}</div>
        <p style="margin-top:20px; font-size:0.9rem; color:var(--text-sub); font-weight:600;">Tap to Flip</p>`;
      if(document.getElementById('fc-auto-speak').checked) speak(v.en);
    } else {
      card.innerHTML = `
        <div class="fc-bn-text">${v.bn}</div>
        <div class="fc-detail-box">
          <p class="fc-ex-en-small">${v.ex_en || ''}</p>
          <span class="fc-ex-bn-small" style="color: var(--text-main);">${v.ex_bn || ''}</span>
        </div>`;
    }
  }

  function fcNext() { triggerHaptic(); if(fcIdx < fcList.length - 1) { fcIdx++; fcFlipped = false; renderFC(); } }
  function fcPrev() { triggerHaptic(); if(fcIdx > 0) { fcIdx--; fcFlipped = false; renderFC(); } }


  function startQuiz() {
    triggerHaptic();
    const cat = document.getElementById('quiz-cat').value;
    const pool = vocab.filter(v => !cat || v.cat === cat);
    if (pool.length < 4) { showToast("Need 4 words."); return; }
    qList = pool.sort(() => Math.random() - 0.5).slice(0, 10).map(cor => {
        const wrg = pool.filter(p => p.en !== cor.en).sort(() => Math.random() - 0.5).slice(0, 3);
        const opts = [cor, ...wrg].sort(() => Math.random() - 0.5);
        return { cor, opts };
    });
    qIdx = 0; qScore = 0; renderQuiz();
  }

  function renderQuiz() {
    const area = document.getElementById('quiz-area');
    if (qIdx >= qList.length) {
        area.innerHTML = `<div class="quiz-score-screen"><h1>${qScore >= 7 ? '🎯' : '💪'}</h1><h2>Quiz Finished!</h2><p>Score: ${qScore} / 10</p><button class="btn btn-primary" onclick="startQuiz()">Restart</button></div>`;
        return;
    }
    const q = qList[qIdx];
    area.innerHTML = `
      <div class="quiz-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span style="font-size:0.85rem; color:var(--accent);">Q ${qIdx + 1}/10</span>
            <span style="font-size:0.85rem; color:var(--correct);">Score: ${qScore}</span>
        </div>
        <h2 style="font-size:2.2rem; color:var(--text-main);">${q.cor.en}</h2>
        <div id="q-opts">${q.opts.map(o => `<div class="q-opt" onclick="checkQ(this, ${o.en === q.cor.en})">${o.bn}</div>`).join('')}</div>
      </div>`;
  }

  function checkQ(btn, isCor) {
    triggerHaptic();
    const container = document.getElementById('q-opts');
    if (container.classList.contains('lock')) return;
    container.classList.add('lock');
    if (isCor) { btn.classList.add('correct'); qScore++; } 
    else { 
      btn.classList.add('wrong'); 
      const options = container.querySelectorAll('.q-opt');
      options.forEach(opt => { if (opt.innerText.trim() === qList[qIdx].cor.bn.trim()) opt.classList.add('correct'); });
    }
    setTimeout(() => { qIdx++; renderQuiz(); }, 1400);
  }

  function renderSaved() {
    const list = vocab.filter(v => progress[v.en]);
    const grid = document.getElementById('grid-saved');
    if(!list.length) { grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:80px; opacity:0.5;"><h3>Library empty</h3></div>`; return; }
    grid.innerHTML = list.map(v => createCard(v)).join('');
  }

  function speak(t) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t); 
    u.lang = 'en-US'; u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }

  function showToast(m) {
    const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2500);
  }

  function initFilters() {
    const cats = [...new Set(vocab.map(v => v.cat))].sort();
    ['f-cat', 'fc-cat', 'quiz-cat'].forEach(id => {
      const el = document.getElementById(id);
      if(el) {
          el.innerHTML = id === 'f-cat' ? '<option value="">Categories</option>' : '<option value="">All Categories</option>';
          cats.forEach(c => el.innerHTML += `<option value="${c}">${c}</option>`);
      }
    });
  }

  function clearProg() { triggerHaptic(); if(confirm("Clear progress?")) { progress = {}; updateStats(); renderBrowse(); renderSaved(); } }

  window.onload = loadData;
</script>
</body>
</html>
