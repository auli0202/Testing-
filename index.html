<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HSC Elite | Smart Study</title>
  <script>
    (function() {
      const saved = localStorage.getItem('hscEliteDark');
      if (saved === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+Bengali:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-sub: #475569;
      --accent: #2563eb;
      --border: #e2e8f0;
      --nav-bg: rgba(255, 255, 255, 0.96);
      --correct: #10b981;
      --wrong: #ef4444;
      --review: #f59e0b;
      --ex-bg: #f1f5f9;
    }

    html.dark {
      --bg-main: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
      --accent: #60a5fa;
      --border: #334155;
      --nav-bg: rgba(15, 23, 42, 0.96);
      --correct: #34d399;
      --wrong: #fb7185;
      --review: #fbbf24;
      --ex-bg: #0f172a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      padding-bottom: 90px;
      transition: background 0.3s;
      line-height: 1.5;
    }

    /* --- Smart Header --- */
    .header {
      background: var(--nav-bg); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 1000; padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      transition: transform 0.4s ease, opacity 0.3s;
    }
    .header.header-hidden { transform: translateY(-100%); pointer-events: none; opacity: 0; }
    
    #header-show-tab {
        position: fixed; top: 0; left: 50%; transform: translateX(-50%);
        background: var(--accent); color: white; padding: 4px 15px;
        border-radius: 0 0 12px 12px; font-size: 0.7rem; font-weight: 800;
        z-index: 1001; cursor: pointer; display: none;
    }

    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: 800; font-size: 1rem; color: var(--accent); cursor: pointer; }
    
    .header-actions { display: flex; align-items: center; gap: 6px; }
    .action-btn-circle {
        width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
        background: var(--card-bg); color: var(--text-main); display: flex;
        align-items: center; justify-content: center; cursor: pointer; font-size: 1rem;
    }
    .action-btn-circle.active { background: var(--accent); color: white; border-color: var(--accent); }

    .stats-row { display: flex; gap: 8px; justify-content: center; align-items: center; }
    .stat-chip { 
      background: var(--card-bg); padding: 4px 10px; border-radius: 50px; border: 1px solid var(--border);
      font-size: 0.65rem; font-weight: 700; cursor: pointer;
    }
    .stat-chip.m { color: var(--correct); }
    .stat-chip.r { color: var(--review); }

    /* Global Progress Bar in Header */
    .overall-progress-wrap { width: 100%; height: 4px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 4px; }
    #overall-progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.5s ease; }

    /* --- Hide Info (Blind) Mode --- */
    .blind-mode .c-tag, .blind-mode .c-bn, .blind-mode .c-ex-en, 
    .blind-mode .c-pron, .blind-mode .c-ex-bn, .blind-mode .c-family-wrap,
    .blind-mode .c-actions { display: none !important; }
    .blind-mode .wcard { min-height: 80px; justify-content: center; }

    .main-container { max-width: 1200px; margin: 0 auto; padding: 12px; }
    .controls { 
      background: var(--card-bg); padding: 14px; border-radius: 20px; border: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
    }
    input, select, .btn {
      padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--text-main); font-size: 0.9rem; outline: none;
    }
    .btn { font-weight: 700; cursor: pointer; }
    .btn-outline { border: 1.5px solid var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: white; border: none; }

    /* --- Browse Cards --- */
    .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .wcard {
      background: var(--card-bg); border-radius: 24px; padding: 22px;
      border: 1px solid var(--border); display: flex; flex-direction: column; 
    }
    .wcard.mastered { border-left: 8px solid var(--correct); }
    .wcard.reviewing { border-left: 8px solid var(--review); }
    
    .c-tag { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; background: var(--accent); color: white; padding: 3px 8px; border-radius: 6px; display: inline-block; margin-bottom: 12px; align-self: flex-start; }
    .c-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
    .c-en { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .c-bn { font-family: 'Noto Serif Bengali', serif; font-size: 1.35rem; color: var(--text-main); font-weight: 600; margin-bottom: 12px; }
    .c-ex-en { font-size: 0.95rem; font-style: italic; color: var(--text-sub); margin-bottom: 10px; line-height: 1.4; padding-left: 10px; border-left: 3px solid var(--accent); }
    .c-pron { font-size: 0.85rem; color: #14b8a6; font-family: monospace; margin-bottom: 12px; font-weight: 600; }
    /* Bn Example Font Increased */
    .c-ex-bn { font-family: 'Noto Serif Bengali', serif; font-size: 1.15rem; color: var(--accent); margin-bottom: 12px; font-weight: 600; line-height: 1.4; }
    .c-family-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
    .c-family { font-size: 0.7rem; background: var(--ex-bg); padding: 3px 9px; border-radius: 6px; color: var(--text-sub); border: 1px solid var(--border); }

    .c-actions { display: flex; gap: 8px; margin-top: auto; border-top: 1px solid var(--border); padding-top: 15px; }
    .s-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid var(--border); font-size: 0.8rem; font-weight: 700; cursor: pointer; background: transparent; color: var(--text-main); }
    .s-btn.m.active { background: var(--correct); color: white; border-color: var(--correct); }
    .s-btn.r.active { background: var(--review); color: white; border-color: var(--review); }

    /* --- Flashcards --- */
    .fc-wrap { max-width: 480px; margin: 0 auto; }
    .session-progress-wrap { width: 100%; height: 6px; background: var(--border); border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
    #session-progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s ease; }
    
    .flip-card {
      background: var(--card-bg); height: 380px; border-radius: 30px; border: 2px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 30px; cursor: pointer; position: relative;
    }
    .fc-speak-btn { position: absolute; top: 20px; right: 20px; font-size: 1.6rem; background: none; border: none; cursor: pointer; }
    
    /* Bn Example Font Increased in FC */
    .fc-ex-bn-big { font-family: 'Noto Serif Bengali', serif; font-size: 1.25rem; color: var(--accent); font-weight: 700; margin-top: 10px; display: block; line-height: 1.4; }

    /* Flashcard Nav Centered */
    .fc-nav { display: flex; justify-content: center; gap: 15px; margin-top: 25px; width: 100%; }
    .fc-nav-btn { flex: 0 1 120px; text-align: center; }

    /* --- Pagination --- */
    .pagination { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; margin: 30px 0; }
    .jump-box { display: flex; gap: 6px; align-items: center; background: var(--card-bg); padding: 5px 12px; border-radius: 10px; border: 1px solid var(--border); font-weight: 700; }

    /* --- Bottom Nav --- */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
      background: var(--nav-bg); backdrop-filter: blur(15px); border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; align-items: center; z-index: 200;
      transition: transform 0.4s ease;
    }
    .bottom-nav.nav-hidden { transform: translateY(100%); }
    .nav-item { border: none; background: none; display: flex; flex-direction: column; align-items: center; color: var(--text-sub); flex: 1; cursor: pointer; }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 1.5rem; }
    .nav-label { font-size: 0.65rem; font-weight: 700; }

    .hidden { display: none !important; }
    #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; opacity: 0; transition: 0.3s; z-index: 1000; }
  </style>
</head>
<body class="elite-mode">

<div id="toast">Message</div>
<div id="header-show-tab" onclick="toggleHeaderManual(false)">Show Header ▽</div>

<header class="header" id="main-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo" id="logo-home">ELITE VOCAB</div>
      <div class="header-actions">
        <button class="action-btn-circle" id="btn-blind" title="Hide Info">👁️</button>
        <button class="action-btn-circle" id="theme-toggle">🌙</button>
        <button class="action-btn-circle" id="btn-header-hide" title="Hide Header">🔼</button>
        <button class="action-btn-circle" id="nav-toggle" title="Toggle Nav">☰</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-chip" id="st-all">📘 <span id="c-all">0</span></div>
      <div class="stat-chip m" id="st-m">✅ <span id="c-m">0</span></div>
      <div class="stat-chip r" id="st-r">🔄 <span id="c-r">0</span></div>
    </div>
    <div class="overall-progress-wrap"><div id="overall-progress-fill"></div></div>
  </div>
</header>

<div class="main-container">
  <!-- BROWSE -->
  <section id="v-browse">
    <div class="controls">
      <input type="text" id="search-input" placeholder="Search word or meaning..." style="flex: 1; min-width: 180px;">
      <select id="f-cat"><option value="">All Categories</option></select>
      <select id="f-status"><option value="">All Words</option><option value="m">Mastered</option><option value="r">Review</option></select>
      <div style="display: flex; gap: 5px;">
        <button class="btn btn-outline" onclick="adjF(-1)">A-</button>
        <button class="btn btn-outline" onclick="adjF(1)">A+</button>
      </div>
    </div>
    <div id="grid-browse" class="word-grid"></div>
    <div id="pag-box" class="pagination"></div>
  </section>

  <!-- FLASHCARDS -->
  <section id="v-flash" class="hidden">
    <div class="controls">
      <select id="fc-cat" style="flex: 1;"><option value="">All Categories</option></select>
      <button class="btn btn-primary" onclick="initFC()">Start Flow</button>
      <label style="display:flex; align-items:center; gap:8px; font-size:0.8rem; font-weight:600;">
        <input type="checkbox" id="fc-auto-speak"> Auto-Speak
      </label>
    </div>
    <div class="fc-wrap">
      <div class="session-progress-wrap"><div id="session-progress-fill"></div></div>
      <div id="fc-card" class="flip-card">
        <p style="color:var(--text-sub); font-weight:600;">Select category to start flow</p>
      </div>
      <div class="fc-nav">
        <button class="btn btn-outline fc-nav-btn" onclick="fcPrev()">PREV</button>
        <button class="btn btn-outline fc-nav-btn" onclick="fcNext()">NEXT</button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="v-quiz" class="hidden">
    <div class="controls">
      <select id="quiz-cat" style="flex: 1;"><option value="">All Categories</option></select>
      <button class="btn btn-primary" onclick="startQuiz()">Generate Duel</button>
    </div>
    <div id="quiz-area"></div>
  </section>

  <!-- SAVED -->
  <section id="v-saved" class="hidden">
    <div class="controls" style="justify-content: space-between; align-items:center;">
      <h3 style="font-weight:800;">My Library</h3>
      <button class="btn" style="color:var(--wrong); border:1.5px solid var(--wrong);" onclick="clearProg()">Reset</button>
    </div>
    <div id="grid-saved" class="word-grid"></div>
  </section>
</div>

<nav class="bottom-nav" id="main-nav">
  <button class="nav-item active" onclick="showV('browse')">
    <div class="nav-icon">📚</div><div class="nav-label">Browse</div>
  </button>
  <button class="nav-item" onclick="showV('flash')">
    <div class="nav-icon">🃏</div><div class="nav-label">Flash</div>
  </button>
  <button class="nav-item" onclick="showV('quiz')">
    <div class="nav-icon">⚡</div><div class="nav-label">Quiz</div>
  </button>
  <button class="nav-item" onclick="showV('saved')">
    <div class="nav-icon">⭐</div><div class="nav-label">Saved</div>
  </button>
</nav>

<script>
  let vocab = [];
  let progress = JSON.parse(localStorage.getItem('hscEliteData') || '{}');
  let curPg = 1;
  const pgSize = 15;
  let isBlindMode = false;
  
  let fcList = [], fcIdx = 0, fcFlipped = false;
  let qList = [], qIdx = 0, qScore = 0;

  // --- Scroll & Visibility ---
  let lastScrollY = window.scrollY;
  let headerManuallyHidden = false;

  window.addEventListener("scroll", () => {
    if (headerManuallyHidden) return;
    const header = document.getElementById("main-header");
    if (window.scrollY > lastScrollY && window.scrollY > 150) {
      header.classList.add("header-hidden");
    } else {
      header.classList.remove("header-hidden");
    }
    lastScrollY = window.scrollY;
  });

  function toggleHeaderManual(hide) {
    const header = document.getElementById("main-header");
    const tab = document.getElementById("header-show-tab");
    headerManuallyHidden = hide;
    if (hide) { header.classList.add("header-hidden"); tab.style.display = "block"; }
    else { header.classList.remove("header-hidden"); tab.style.display = "none"; }
  }

  // --- CSV Logic ---
  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    const data = [];
    for(let i = 1; i < lines.length; i++) {
      const row = []; let cell = '', inQ = false;
      for(let char of lines[i]) {
        if(char === '"') inQ = !inQ;
        else if(char === ',' && !inQ) { row.push(cell.trim()); cell = ''; }
        else cell += char;
      }
      row.push(cell.trim());
      if(row[0] && row[1]) {
        data.push({
          en: row[0], bn: row[1], pron: row[2] || '', 
          ex_en: row[3] || '', cat: row[4] || 'Misc',
          ex_bn: row[5] || '', family: row[6] || ''
        });
      }
    }
    return data;
  }

  async function loadData() {
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8DBdIY6VFMiSQvoLP_VY-6iE-zYfh_ClBckWTI00eQXNMa_JnXilcdVoE6FRaSt8TeOHh2kCE0Wp6/pub?gid=0&single=true&output=csv';
    try {
      const res = await fetch(url);
      const txt = await res.text();
      vocab = parseCSV(txt);
      initFilters();
      renderBrowse();
      updateStats();
    } catch(e) { showToast("Error connecting to data."); }
  }

  function updateStats() {
    const m = Object.values(progress).filter(v => v === 'm').length;
    const r = Object.values(progress).filter(v => v === 'r').length;
    const total = vocab.length;
    
    document.getElementById('c-all').innerText = total;
    document.getElementById('c-m').innerText = m;
    document.getElementById('c-r').innerText = r;
    
    // Overall Library Progress Bar
    if (total > 0) {
        const percent = ((m + r) / total) * 100;
        document.getElementById('overall-progress-fill').style.width = percent + '%';
    }
    
    localStorage.setItem('hscEliteData', JSON.stringify(progress));
  }

  function toggleStatus(en, status) {
    if(progress[en] === status) delete progress[en];
    else progress[en] = status;
    updateStats();
    renderBrowse(false);
    if(!document.getElementById('v-saved').classList.contains('hidden')) renderSaved();
  }

  function renderBrowse(scroll = true) {
    const query = document.getElementById('search-input').value.toLowerCase();
    const cat = document.getElementById('f-cat').value;
    const stat = document.getElementById('f-status').value;

    const filtered = vocab.filter(v => {
      const matchSearch = v.en.toLowerCase().includes(query) || v.bn.includes(query);
      const matchCat = !cat || v.cat === cat;
      const matchStat = !stat || progress[v.en] === stat;
      return matchSearch && matchCat && matchStat;
    });

    const total = Math.ceil(filtered.length / pgSize);
    curPg = Math.min(curPg, total || 1);
    const items = filtered.slice((curPg - 1) * pgSize, curPg * pgSize);

    const grid = document.getElementById('grid-browse');
    grid.innerHTML = items.map(v => createCard(v)).join('');
    renderPag(total);
    if(scroll) window.scrollTo(0,0);
  }

  function createCard(v) {
    const s = progress[v.en];
    const fam = v.family ? v.family.split(',').map(f => `<span class="c-family">${f.trim()}</span>`).join('') : '';
    return `
      <div class="wcard ${s === 'm' ? 'mastered' : (s === 'r' ? 'reviewing' : '')}">
        <div class="c-tag">${v.cat}</div>
        <div class="c-header">
          <div class="c-en">${v.en}</div>
          <button style="background:none; border:none; font-size:1.4rem; cursor:pointer;" onclick="speak('${v.en.replace(/'/g,"")}')">🔊</button>
        </div>
        <div class="c-bn">${v.bn}</div>
        ${v.ex_en ? `<div class="c-ex-en">${v.ex_en}</div>` : ''}
        <div class="c-pron">${v.pron}</div>
        ${v.ex_bn ? `<div class="c-ex-bn">${v.ex_bn}</div>` : ''}
        <div class="c-family-wrap">${fam}</div>
        <div class="c-actions">
          <button class="s-btn m ${s==='m'?'active':''}" onclick="toggleStatus('${v.en.replace(/'/g,"\\'")}', 'm')">Master</button>
          <button class="s-btn r ${s==='r'?'active':''}" onclick="toggleStatus('${v.en.replace(/'/g,"\\'")}', 'r')">Review</button>
        </div>
      </div>`;
  }

  function renderPag(total) {
    const box = document.getElementById('pag-box');
    if(total <= 1) { box.innerHTML = ''; return; }
    let html = `<div class="jump-box"><input type="number" id="jump-in" style="width:40px; border:none; background:none; text-align:center; color:var(--accent); font-weight:800;" value="${curPg}"> <span>/ ${total}</span> <button class="btn btn-primary" style="padding:4px 8px; border-radius:8px;" onclick="doJump(${total})">Go</button></div>`;
    for(let i = 1; i <= total; i++) {
      if(i === 1 || i === total || (i >= curPg - 1 && i <= curPg + 1)) {
        html += `<button class="btn ${i === curPg ? 'btn-primary' : 'btn-outline'}" style="min-width:35px;" onclick="setPg(${i})">${i}</button>`;
      } else if(i === curPg - 2 || i === curPg + 2) html += `<span style="opacity:0.4">...</span>`;
    }
    box.innerHTML = html;
  }
  function setPg(p) { curPg = p; renderBrowse(); }
  function doJump(max) { const p = parseInt(document.getElementById('jump-in').value); if(p >= 1 && p <= max) setPg(p); }

  function showV(v) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`v-${v}`).classList.remove('hidden');
    const allNavs = document.querySelectorAll('.nav-item');
    const idxMap = { 'browse': 0, 'flash': 1, 'quiz': 2, 'saved': 3 };
    allNavs[idxMap[v]].classList.add('active');
    if(v === 'saved') renderSaved();
    window.scrollTo(0,0);
  }

  // --- Buttons ---
  document.getElementById('btn-blind').onclick = function() {
    isBlindMode = !isBlindMode;
    document.body.classList.toggle('blind-mode');
    this.classList.toggle('active');
    showToast(isBlindMode ? "Blind Mode On" : "Blind Mode Off");
  };

  document.getElementById('theme-toggle').onclick = function() {
    const isD = document.documentElement.classList.toggle('dark');
    localStorage.setItem('hscEliteDark', isD ? 'dark' : 'light');
    this.innerText = isD ? "☀️" : "🌙";
  };

  document.getElementById('btn-header-hide').onclick = () => toggleHeaderManual(true);

  document.getElementById('nav-toggle').onclick = function() {
    const nav = document.getElementById('main-nav');
    const isHidden = nav.classList.toggle('nav-hidden');
    document.body.classList.toggle('no-nav');
    showToast(isHidden ? "Nav Hidden" : "Nav Shown");
  };

  document.getElementById('logo-home').onclick = function() {
    document.getElementById('search-input').value = '';
    document.getElementById('f-cat').value = '';
    document.getElementById('f-status').value = '';
    curPg = 1; renderBrowse(); showV('browse');
  };

  // --- Flashcards ---
  function initFC() {
    const cat = document.getElementById('fc-cat').value;
    fcList = vocab.filter(v => !cat || v.cat === cat).sort(() => Math.random() - 0.5);
    fcIdx = 0; fcFlipped = false;
    if(fcList.length) renderFC();
    else showToast("No words found!");
  }
  function renderFC() {
    const v = fcList[fcIdx];
    const card = document.getElementById('fc-card');
    
    // Session Progress
    const sessionPercent = ((fcIdx + 1) / fcList.length) * 100;
    document.getElementById('session-progress-fill').style.width = sessionPercent + '%';

    if(!fcFlipped) {
      card.innerHTML = `<button class="fc-speak-btn" onclick="event.stopPropagation(); speak('${v.en.replace(/'/g,"")}')">🔊</button><span class="c-tag">${v.cat}</span><h2 style="font-size: 2.8rem; font-weight:800;">${v.en}</h2><p style="margin-top:40px; font-size:0.8rem; color:var(--text-sub); font-weight:600;">Tap to see meaning</p>`;
      if(document.getElementById('fc-auto-speak').checked) speak(v.en);
    } else {
      card.innerHTML = `<h2 style="font-family:'Noto Serif Bengali'; font-size: 2.2rem;">${v.bn}</h2><div style="margin-top:20px; padding: 20px; background:var(--ex-bg); border-radius:20px; width:100%;"><p style="font-style:italic; margin-bottom:10px;">${v.ex_en || ''}</p><span class="fc-ex-bn-big">${v.ex_bn || ''}</span></div>`;
    }
  }
  function fcNext() { if(fcIdx < fcList.length - 1) { fcIdx++; fcFlipped = false; renderFC(); } }
  function fcPrev() { if(fcIdx > 0) { fcIdx--; fcFlipped = false; renderFC(); } }

  // --- Quiz ---
  function startQuiz() {
    const cat = document.getElementById('quiz-cat').value;
    const pool = vocab.filter(v => !cat || v.cat === cat);
    if(pool.length < 4) return showToast("Min 4 words required.");
    qList = pool.sort(() => Math.random() - 0.5).slice(0, 10).map(cor => {
      const wrg = pool.filter(p => p.en !== cor.en).sort(() => Math.random() - 0.5).slice(0, 3);
      const opts = [cor, ...wrg].sort(() => Math.random() - 0.5);
      return { cor, opts };
    });
    qIdx = 0; qScore = 0; renderQuiz();
  }
  function renderQuiz() {
    const area = document.getElementById('quiz-area');
    if(qIdx >= qList.length) {
      area.innerHTML = `<div style="text-align:center; padding:40px;"><h2>🎯 Result: ${qScore}/10</h2><button class="btn btn-primary" onclick="startQuiz()" style="margin-top:20px; padding:12px 30px;">Restart</button></div>`;
      return;
    }
    const q = qList[qIdx];
    area.innerHTML = `<div class="quiz-card"><p style="font-size:0.8rem; font-weight:800; color:var(--accent);">Q ${qIdx+1}/10</p><h2 style="font-size:2.2rem; margin:10px 0;">${q.cor.en}</h2><div id="q-opts">${q.opts.map(o => `<div class="q-opt" onclick="checkQ(this, ${o.en === q.cor.en})">${o.bn}</div>`).join('')}</div></div>`;
  }
  function checkQ(btn, isCor) {
    if(btn.parentNode.classList.contains('lock')) return;
    btn.parentNode.classList.add('lock');
    if(isCor) { btn.classList.add('correct'); qScore++; } else btn.classList.add('wrong');
    setTimeout(() => { qIdx++; renderQuiz(); }, 1200);
  }

  function renderSaved() {
    const list = vocab.filter(v => progress[v.en]);
    const grid = document.getElementById('grid-saved');
    if(!list.length) { grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:80px; opacity:0.5;"><h3>Library empty.</h3></div>`; return; }
    grid.innerHTML = list.map(v => createCard(v)).join('');
  }

  function speak(t) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }

  function showToast(m) {
    const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2500);
  }

  function initFilters() {
    const cats = [...new Set(vocab.map(v => v.cat))].sort();
    ['f-cat', 'fc-cat', 'quiz-cat'].forEach(id => {
      const el = document.getElementById(id);
      cats.forEach(c => el.innerHTML += `<option value="${c}">${c}</option>`);
    });
  }

  function clearProg() { if(confirm("Reset progress?")) { progress = {}; updateStats(); renderBrowse(); renderSaved(); } }

  function adjF(v) {
    const b = document.body;
    let s = parseInt(window.getComputedStyle(b).fontSize);
    b.style.fontSize = Math.min(Math.max(s + v, 12), 24) + 'px';
  }

  // --- Listeners ---
  document.getElementById('search-input').oninput = () => { curPg = 1; renderBrowse(false); };
  document.getElementById('f-cat').onchange = () => { curPg = 1; renderBrowse(); };
  document.getElementById('f-status').onchange = () => { curPg = 1; renderBrowse(); };
  document.getElementById('fc-card').onclick = () => { fcFlipped = !fcFlipped; renderFC(); };
  document.getElementById('st-m').onclick = () => { showV('browse'); document.getElementById('f-status').value='m'; renderBrowse(); };
  document.getElementById('st-r').onclick = () => { showV('browse'); document.getElementById('f-status').value='r'; renderBrowse(); };
  document.getElementById('st-all').onclick = () => { showV('browse'); document.getElementById('f-status').value=''; renderBrowse(); };

  loadData();
</script>
</body>
</html>
